name: Feature request
description: Suggest something the remote should be able to do
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Much of what people want is already reachable through a `shell` or `applescript` binding
        without any code change — worth checking the README's action table first.
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do that you cannot do today?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What would it look like in config.jsonc?
      render: jsonc
  - type: textarea
    id: alternatives
    attributes:
      label: What did you try instead, and why did it not work?
